name: RAG Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
  pull_request:
    branches: [main]

# Grant write permissions so the workflow can commit history changes back to the repo
permissions:
  contents: write

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for correct commit SHA tracking

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install dvc pyyaml langchain-text-splitters

      - name: Validate DVC pipeline structure
        run: |
          dvc dag
          echo "Pipeline DAG validated successfully"

      - name: Validate params.yaml
        run: |
          python -c "
          import yaml
          with open('params.yaml') as f:
              p = yaml.safe_load(f)
          assert p['chunk']['chunk_size'] == 1000
          assert p['chunk']['chunk_overlap'] == 200
          print('params.yaml valid')
          "

      - name: Run Quality Gate and Track History
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python src/ci_quality_gate.py

      - name: Commit and Push Score History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/evaluation/scores_history.json
          # Commit only if there are changes to prevent workflow failure
          git diff-index --quiet HEAD || git commit -m "Auto-update evaluation score history [skip ci]"
          git push origin main