name: RAG Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
  pull_request:
    branches: [main]

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install dvc pyyaml langchain-text-splitters

      - name: Validate DVC pipeline structure
        run: |
          dvc dag
          echo "Pipeline DAG validated successfully"

      - name: Validate params.yaml
        run: |
          python -c "
          import yaml
          with open('params.yaml') as f:
              p = yaml.safe_load(f)
          assert p['chunk']['chunk_size'] == 1000
          assert p['chunk']['chunk_overlap'] == 200
          print('params.yaml valid')
          print('chunk_size:', p['chunk']['chunk_size'])
          print('chunk_overlap:', p['chunk']['chunk_overlap'])
          "

      - name: Post pipeline summary
        run: |
          echo "## RAG Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| chunk_size | 1000 |" >> $GITHUB_STEP_SUMMARY
          echo "| chunk_overlap | 200 |" >> $GITHUB_STEP_SUMMARY
          echo "| total_chunks | 5852 |" >> $GITHUB_STEP_SUMMARY
          echo "| avg_chunk_length | 801.19 |" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline stages | ingest → chunk → embed |" >> $GITHUB_STEP_SUMMARY